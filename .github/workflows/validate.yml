name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Re-run weekly so upstream HACS/hassfest rule changes are caught.
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate with hassfest
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate with HACS
        uses: hacs/action@main
        with:
          category: integration
          # This integration isn't in the home-assistant/brands repo, which is
          # only required for the default HACS store, not custom-repo installs.
          ignore: brands
